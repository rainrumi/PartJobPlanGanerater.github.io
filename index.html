<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>バイト出勤可能日一覧</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background: #f4f6fb;
      color: #222;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 16px;
    }

    h1 {
      font-size: 24px;
      margin: 0 0 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    .section-title {
      font-size: 18px;
      font-weight: bold;
      margin: 0 0 12px;
    }

    .tag-create-grid {
      display: grid;
      grid-template-columns: 1fr 1fr auto auto;
      gap: 10px;
      align-items: end;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    input[type="time"] {
      width: 100%;
      min-height: 44px;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #cfd6e4;
      border-radius: 10px;
      background: #fff;
    }

    button {
      border: none;
      border-radius: 10px;
      min-height: 44px;
      padding: 10px 14px;
      font-size: 15px;
      cursor: pointer;
    }

    .primary-btn {
      background: #2d6cdf;
      color: #fff;
    }

    .sub-btn {
      background: #e7ecf7;
      color: #222;
    }

    .danger-btn {
      background: #e74c3c;
      color: #fff;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .tag-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 12px;
      color: #fff;
      font-weight: bold;
      border: 3px solid transparent;
      min-height: 44px;
    }

    .tag-chip.selected {
      border-color: #111;
      box-shadow: 0 0 0 2px rgba(0,0,0,0.08);
    }

    .tag-chip button {
      min-height: auto;
      padding: 4px 8px;
      font-size: 12px;
      background: rgba(255,255,255,0.22);
      color: #fff;
      border-radius: 999px;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .calendar-title {
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      flex: 1;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .weekday {
      text-align: center;
      font-weight: bold;
      padding: 8px 0;
      color: #667;
      font-size: 14px;
    }

    .day-cell {
      background: #fff;
      border: 1px solid #dbe2ef;
      border-radius: 12px;
      min-height: 120px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      cursor: pointer;
      transition: transform 0.08s ease, box-shadow 0.08s ease;
    }

    .day-cell:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .day-cell.outside {
      background: #f0f3f8;
      color: #9aa3b2;
      cursor: default;
    }

    .day-number {
      font-weight: bold;
      font-size: 15px;
    }

    .shift-badge {
      border-radius: 999px;
      color: #fff;
      padding: 4px 8px;
      font-size: 12px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-height: 24px;
      display: flex;
      align-items: center;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      border: 1px solid #cfd6e4;
      border-radius: 12px;
      padding: 12px;
      font-size: 15px;
      resize: vertical;
    }

    .output-actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .help-text {
      margin-top: 8px;
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }

    @media (max-width: 720px) {
      .tag-create-grid {
        grid-template-columns: 1fr;
      }

      .calendar-title {
        font-size: 18px;
      }

      .day-cell {
        min-height: 100px;
      }

      .shift-badge {
        font-size: 11px;
      }
    }
    
    .calendar-title-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .jump-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    .jump-controls select {
      min-height: 40px;
      padding: 8px 10px;
      border: 1px solid #cfd6e4;
      border-radius: 10px;
      font-size: 14px;
      background: #fff;
    }
    
    @media (max-width: 720px) {
      .calendar-header {
        flex-direction: column;
        align-items: stretch;
      }
    
      .calendar-title-wrap {
        flex-direction: column;
        gap: 10px;
      }
    
      .jump-controls {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>バイト出勤可能日一覧</h1>

    <div class="card">
      <div class="section-title">新しいシフト時間帯タグを作成</div>

      <div class="tag-create-grid">
        <div>
          <label for="startTime">開始時間</label>
          <input type="time" id="startTime" value="08:00" />
        </div>

        <div>
          <label for="endTime">終了時間</label>
          <input type="time" id="endTime" value="13:00" />
        </div>

        <button class="primary-btn" id="addTagBtn">タグ追加</button>
        <button class="sub-btn" id="clearSelectionBtn">選択解除</button>
      </div>

      <div class="help-text">
        時間帯タグを選択して、カレンダーの日付を押すと追加/削除するわ。<br />
        同じタグがその日についていれば削除、別タグなら追加よ。1日最大3件までで、4件目は最初の1件が消えるわ。
      </div>

      <div class="tag-list" id="tagList"></div>
    </div>

    <div class="card">
      <div class="calendar-header">
        <button class="sub-btn" id="prevMonthBtn">前の月</button>

        <div class="calendar-title-wrap">
          <div class="calendar-title" id="calendarTitle"></div>

          <div class="jump-controls">
            <select id="jumpYear"></select>
            <select id="jumpMonth"></select>
            <button class="sub-btn" id="jumpBtn">移動</button>
          </div>
        </div>

        <button class="sub-btn" id="nextMonthBtn">次の月</button>
      </div>

      <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="card">
      <div class="section-title">出力テキスト</div>
      <textarea id="output" readonly></textarea>
      <div class="output-actions">
        <button class="primary-btn" id="copyBtn">コピー</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "shift_calendar_app_v3";

    const BASE_COLOR = "#e74c3c";

    const BASE_HSL = hexToHsl(BASE_COLOR);
    const BASE_LUMINANCE = relativeLuminanceFromHex(BASE_COLOR);

    const state = loadState();

    const startTimeInput = document.getElementById("startTime");
    const endTimeInput = document.getElementById("endTime");
    const addTagBtn = document.getElementById("addTagBtn");
    const clearSelectionBtn = document.getElementById("clearSelectionBtn");
    const tagListEl = document.getElementById("tagList");

    const prevMonthBtn = document.getElementById("prevMonthBtn");
    const nextMonthBtn = document.getElementById("nextMonthBtn");
    const calendarTitleEl = document.getElementById("calendarTitle");
    const calendarGridEl = document.getElementById("calendarGrid");

    const outputEl = document.getElementById("output");
    const copyBtn = document.getElementById("copyBtn");

    const jumpYearEl = document.getElementById("jumpYear");
    const jumpMonthEl = document.getElementById("jumpMonth");
    const jumpBtn = document.getElementById("jumpBtn");

    addTagBtn.addEventListener("click", handleAddTag);
    clearSelectionBtn.addEventListener("click", () => {
      state.selectedTagId = null;
      saveState();
      initializeJumpControls();
      renderAll();
    });

    prevMonthBtn.addEventListener("click", () => {
      state.currentMonth -= 1;
      if (state.currentMonth < 0) {
        state.currentMonth = 11;
        state.currentYear -= 1;
      }
      saveState();
      renderCalendar();
    });

    nextMonthBtn.addEventListener("click", () => {
      state.currentMonth += 1;
      if (state.currentMonth > 11) {
        state.currentMonth = 0;
        state.currentYear += 1;
      }
      saveState();
      renderCalendar();
    });

    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(outputEl.value);
        alert("コピーしたわよ！");
      } catch (error) {
        alert("コピーに失敗したわ…");
      }
    });

    function loadState() {
      const today = new Date();
      const defaultState = {
        currentYear: today.getFullYear(),
        currentMonth: today.getMonth(),
        selectedTagId: null,
        nextTagId: 1,
        tags: [
          { id: 1, start: "08:00", end: "13:00", color: generateRandomHueColor() },
          { id: 2, start: "18:00", end: "21:00", color: generateRandomHueColor() }
        ],
        shiftsByDate: {}
      };

      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) {
        defaultState.nextTagId = 3;
        return defaultState;
      }

      try {
        const parsed = JSON.parse(saved);
        return {
          currentYear: parsed.currentYear ?? defaultState.currentYear,
          currentMonth: parsed.currentMonth ?? defaultState.currentMonth,
          selectedTagId: parsed.selectedTagId ?? null,
          nextTagId: parsed.nextTagId ?? 1,
          tags: Array.isArray(parsed.tags) ? parsed.tags : defaultState.tags,
          shiftsByDate: parsed.shiftsByDate ?? {}
        };
      } catch {
        defaultState.nextTagId = 3;
        return defaultState;
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function handleAddTag() {
      const start = startTimeInput.value;
      const end = endTimeInput.value;

      if (!start || !end) {
        alert("開始時間と終了時間を入れなさいよ！");
        return;
      }

      if (start >= end) {
        alert("終了時間は開始時間より後にしてちょうだい！");
        return;
      }

      const exists = state.tags.some(tag => tag.start === start && tag.end === end);
      if (exists) {
        alert("その時間帯タグはもうあるわよ！");
        return;
      }

      const newTag = {
        id: state.nextTagId,
        start,
        end,
        color: generateRandomHueColor()
      };

      state.tags.push(newTag);
      state.selectedTagId = newTag.id;
      state.nextTagId += 1;

      saveState();
      renderAll();
    }

    function removeTag(tagId) {
      const targetTag = state.tags.find(tag => tag.id === tagId);
      if (!targetTag) return;

      state.tags = state.tags.filter(tag => tag.id !== tagId);

      for (const dateKey of Object.keys(state.shiftsByDate)) {
        state.shiftsByDate[dateKey] = state.shiftsByDate[dateKey].filter(
          shift => shift.tagId !== tagId
        );

        if (state.shiftsByDate[dateKey].length === 0) {
          delete state.shiftsByDate[dateKey];
        }
      }

      if (state.selectedTagId === tagId) {
        state.selectedTagId = null;
      }

      saveState();
      renderAll();
    }

    function renderAll() {
      renderTagList();
      renderCalendar();
      renderOutput();
    }

    function renderTagList() {
      tagListEl.innerHTML = "";

      if (state.tags.length === 0) {
        const empty = document.createElement("div");
        empty.textContent = "時間帯タグはまだないわ。先に作りなさいよ。";
        empty.style.color = "#666";
        tagListEl.appendChild(empty);
        return;
      }

      state.tags.forEach(tag => {
        const chip = document.createElement("div");
        chip.className = "tag-chip";
        if (tag.id === state.selectedTagId) {
          chip.classList.add("selected");
        }
        chip.style.background = tag.color;

        const text = document.createElement("span");
        text.textContent = `${removeLeadingZero(tag.start)}～${removeLeadingZero(tag.end)}`;
        text.style.cursor = "pointer";
        text.addEventListener("click", () => {
          state.selectedTagId = tag.id;
          saveState();
          renderTagList();
        });

        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "削除";
        deleteBtn.addEventListener("click", (event) => {
          event.stopPropagation();
          removeTag(tag.id);
        });

        chip.addEventListener("click", () => {
          state.selectedTagId = tag.id;
          saveState();
          renderTagList();
        });

        chip.appendChild(text);
        chip.appendChild(deleteBtn);
        tagListEl.appendChild(chip);
      });
    }

    function renderCalendar() {
      calendarGridEl.innerHTML = "";

      const weekdays = ["日", "月", "火", "水", "木", "金", "土"];
      weekdays.forEach(day => {
        const el = document.createElement("div");
        el.className = "weekday";
        el.textContent = day;
        calendarGridEl.appendChild(el);
      });

      calendarTitleEl.textContent = `${state.currentYear}年 ${state.currentMonth + 1}月`;

      const firstDay = new Date(state.currentYear, state.currentMonth, 1);
      const lastDay = new Date(state.currentYear, state.currentMonth + 1, 0);
      const daysInMonth = lastDay.getDate();
      const startWeekday = firstDay.getDay();

      for (let i = 0; i < startWeekday; i++) {
        const blank = document.createElement("div");
        blank.className = "day-cell outside";
        calendarGridEl.appendChild(blank);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dateKey = formatDateKey(state.currentYear, state.currentMonth + 1, day);
        const shifts = state.shiftsByDate[dateKey] || [];

        const cell = document.createElement("div");
        cell.className = "day-cell";
        cell.addEventListener("click", () => handleDateClick(dateKey));

        const dayNumber = document.createElement("div");
        dayNumber.className = "day-number";
        dayNumber.textContent = day;
        cell.appendChild(dayNumber);

        shifts.forEach(shift => {
          const badge = document.createElement("div");
          badge.className = "shift-badge";
          badge.style.background = shift.color;
          badge.textContent = `${removeLeadingZero(shift.start)}～${removeLeadingZero(shift.end)}`;
          cell.appendChild(badge);
        });

        calendarGridEl.appendChild(cell);
      }
    }

    function handleDateClick(dateKey) {
      const selectedTag = state.tags.find(tag => tag.id === state.selectedTagId);
      if (!selectedTag) {
        alert("先に時間帯タグを選びなさいよ！");
        return;
      }

      if (!state.shiftsByDate[dateKey]) {
        state.shiftsByDate[dateKey] = [];
      }

      const shifts = state.shiftsByDate[dateKey];
      const existingIndex = shifts.findIndex(shift => shift.tagId === selectedTag.id);

      if (existingIndex >= 0) {
        shifts.splice(existingIndex, 1);
      } else {
        shifts.push({
          tagId: selectedTag.id,
          start: selectedTag.start,
          end: selectedTag.end,
          color: selectedTag.color,
          createdAt: Date.now()
        });

        if (shifts.length > 3) {
          shifts.shift();
        }
      }

      if (shifts.length === 0) {
        delete state.shiftsByDate[dateKey];
      }

      saveState();
      renderCalendar();
      renderOutput();
    }

    function renderOutput() {
      const lines = [];

      const dateKeys = Object.keys(state.shiftsByDate).sort((a, b) => {
        return a.localeCompare(b);
      });

      dateKeys.forEach(dateKey => {
        const shifts = [...state.shiftsByDate[dateKey]].sort(compareShiftTime);
        const [year, month, day] = dateKey.split("-").map(Number);

        shifts.forEach(shift => {
          lines.push(
            `${month}/${day} ${removeLeadingZero(shift.start)}～${removeLeadingZero(shift.end)}`
          );
        });
      });

      outputEl.value = lines.join("\n");
    }

    function compareShiftTime(a, b) {
      const startCompare = a.start.localeCompare(b.start);
      if (startCompare !== 0) {
        return startCompare;
      }
      return a.end.localeCompare(b.end);
    }

    function formatDateKey(year, month, day) {
      return `${year}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    }

    function removeLeadingZero(timeStr) {
      const [hour, minute] = timeStr.split(":");
      return `${Number(hour)}:${minute}`;
    }

    function hexToHsl(hex) {
      const { r, g, b } = hexToRgb(hex);
      const rn = r / 255;
      const gn = g / 255;
      const bn = b / 255;

      const max = Math.max(rn, gn, bn);
      const min = Math.min(rn, gn, bn);
      const delta = max - min;

      let h = 0;
      let s = 0;
      const l = (max + min) / 2;

      if (delta !== 0) {
        s = delta / (1 - Math.abs(2 * l - 1));

        switch (max) {
          case rn:
            h = 60 * (((gn - bn) / delta) % 6);
            break;
          case gn:
            h = 60 * (((bn - rn) / delta) + 2);
            break;
          case bn:
            h = 60 * (((rn - gn) / delta) + 4);
            break;
        }
      }

      if (h < 0) {
        h += 360;
      }

      return {
        h,
        s: s * 100,
        l: l * 100
      };
    }

    function hexToRgb(hex) {
  const normalized = hex.replace("#", "");
  const value = normalized.length === 3
    ? normalized.split("").map(ch => ch + ch).join("")
    : normalized;

  return {
    r: parseInt(value.slice(0, 2), 16),
    g: parseInt(value.slice(2, 4), 16),
    b: parseInt(value.slice(4, 6), 16)
  };
}

function rgbToHex(r, g, b) {
  return (
    "#" +
    [r, g, b]
      .map(v => Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2, "0"))
      .join("")
  );
}

function hexToHsl(hex) {
  const { r, g, b } = hexToRgb(hex);
  return rgbToHsl(r, g, b);
}

function rgbToHsl(r, g, b) {
  const rn = r / 255;
  const gn = g / 255;
  const bn = b / 255;

  const max = Math.max(rn, gn, bn);
  const min = Math.min(rn, gn, bn);
  const delta = max - min;

  let h = 0;
  let s = 0;
  const l = (max + min) / 2;

  if (delta !== 0) {
    s = delta / (1 - Math.abs(2 * l - 1));

    switch (max) {
      case rn:
        h = 60 * (((gn - bn) / delta) % 6);
        break;
      case gn:
        h = 60 * (((bn - rn) / delta) + 2);
        break;
      case bn:
        h = 60 * (((rn - gn) / delta) + 4);
        break;
    }
  }

  if (h < 0) {
    h += 360;
  }

  return {
    h,
    s: s * 100,
    l: l * 100
  };
}

function hslToRgb(h, s, l) {
  s /= 100;
  l /= 100;

  const c = (1 - Math.abs(2 * l - 1)) * s;
  const x = c * (1 - Math.abs((h / 60) % 2 - 1));
  const m = l - c / 2;

  let rPrime = 0;
  let gPrime = 0;
  let bPrime = 0;

  if (0 <= h && h < 60) {
    rPrime = c; gPrime = x; bPrime = 0;
  } else if (60 <= h && h < 120) {
    rPrime = x; gPrime = c; bPrime = 0;
  } else if (120 <= h && h < 180) {
    rPrime = 0; gPrime = c; bPrime = x;
  } else if (180 <= h && h < 240) {
    rPrime = 0; gPrime = x; bPrime = c;
  } else if (240 <= h && h < 300) {
    rPrime = x; gPrime = 0; bPrime = c;
  } else {
    rPrime = c; gPrime = 0; bPrime = x;
  }

  return {
    r: Math.round((rPrime + m) * 255),
    g: Math.round((gPrime + m) * 255),
    b: Math.round((bPrime + m) * 255)
  };
}

function hslToHex(h, s, l) {
  const { r, g, b } = hslToRgb(h, s, l);
  return rgbToHex(r, g, b);
}

function srgbToLinear(channel255) {
  const c = channel255 / 255;
  return c <= 0.04045
    ? c / 12.92
    : Math.pow((c + 0.055) / 1.055, 2.4);
}

function relativeLuminance(r, g, b) {
  const R = srgbToLinear(r);
  const G = srgbToLinear(g);
  const B = srgbToLinear(b);
  return 0.2126 * R + 0.7152 * G + 0.0722 * B;
}

function relativeLuminanceFromHex(hex) {
  const { r, g, b } = hexToRgb(hex);
  return relativeLuminance(r, g, b);
}

function luminanceFromHsl(h, s, l) {
  const { r, g, b } = hslToRgb(h, s, l);
  return relativeLuminance(r, g, b);
}

function solveLightnessForTargetLuminance(h, s, targetLum) {
  let low = 0;
  let high = 100;
  let bestL = BASE_HSL.l;
  let bestDiff = Infinity;

  for (let i = 0; i < 24; i++) {
    const mid = (low + high) / 2;
    const lum = luminanceFromHsl(h, s, mid);
    const diff = Math.abs(lum - targetLum);

    if (diff < bestDiff) {
      bestDiff = diff;
      bestL = mid;
    }

    if (lum < targetLum) {
      low = mid;
    } else {
      high = mid;
    }
  }

  return bestL;
}

function generateRandomHueColor() {
  const randomHue = Math.floor(Math.random() * 360);
  const fixedSaturation = BASE_HSL.s;
  const adjustedLightness = solveLightnessForTargetLuminance(
    randomHue,
    fixedSaturation,
    BASE_LUMINANCE
  );

  return hslToHex(randomHue, fixedSaturation, adjustedLightness);
}

    renderAll();
  </script>
</body>
