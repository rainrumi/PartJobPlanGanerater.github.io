<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>バイト出勤可能日一覧</title>
    <link rel="stylesheet" href="index.css" />
</head>
<body>
  <div class="container">
    <h1>バイト出勤可能日一覧</h1>

    <div class="card">
      <div class="section-title">新しいシフト時間帯タグを作成</div>

      <div class="tag-create-grid">
        <div>
          <label for="startTime">開始時間</label>
          <input type="time" id="startTime" value="08:00" />
        </div>

        <div>
          <label for="endTime">終了時間</label>
          <input type="time" id="endTime" value="13:00" />
        </div>

        <button class="primary-btn" id="addTagBtn">タグ追加</button>
        <button class="sub-btn" id="clearSelectionBtn">選択解除</button>
      </div>

      <div class="help-text">
        時間帯タグを選択して、カレンダーの日付を押すと追加/削除するわ。<br />
        同じタグがその日についていれば削除、別タグなら追加よ。1日最大3件までで、4件目は最初の1件が消えるわ。
      </div>

      <div class="tag-list" id="tagList"></div>
    </div>

    <div class="card">
      <div class="calendar-header">
        <button class="sub-btn" id="prevMonthBtn">前の月</button>

        <div class="calendar-title-wrap">
          <div class="jump-controls">
            <select id="jumpYear"></select>
            <select id="jumpMonth"></select>
            <button class="jump-btn" id="jumpBtn">移動</button>
          </div>

          <div class="calendar-title" id="calendarTitle"></div>
        </div>

        <button class="sub-btn" id="nextMonthBtn">次の月</button>
      </div>

      <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="card">
      <div class="section-title">出力テキスト</div>
      <textarea id="output" readonly></textarea>
      <div class="output-actions">
        <button class="primary-btn" id="copyBtn">コピー</button>
      </div>
    </div>
  </div>

    <script src="index.js"></script>
</body>
</html>
